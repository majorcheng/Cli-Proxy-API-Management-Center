name: Build and Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: '要构建并上传的标签，例如 v1.1.7'
        required: true
        type: string

jobs:
  build-and-release:
    if: github.event_name != 'release' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi

          if [ -z "${tag}" ]; then
            echo "无法确定发布标签" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ steps.meta.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all-in-one HTML
        run: npm run build
        env:
          VERSION: ${{ steps.meta.outputs.tag }}

      - name: Verify release assets
        run: |
          test -f dist/index.html
          test -f dist/management.html
          ls -lh dist/index.html dist/management.html

      - name: Generate release notes
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          current_tag="${{ steps.meta.outputs.tag }}"
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"
          if [ -n "${previous_tag}" ]; then
            range="${previous_tag}..${current_tag}"
          else
            range="${current_tag}"
          fi

          : > release-notes.md
          git log --pretty=format:"- %h %s" "${range}" >> release-notes.md

      - name: Create or update release from tag push
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" dist/management.html --clobber
            gh release edit "${TAG_NAME}" --title "${TAG_NAME}" --notes-file release-notes.md --latest
          else
            gh release create "${TAG_NAME}" dist/management.html \
              --title "${TAG_NAME}" \
              --notes-file release-notes.md \
              --verify-tag \
              --latest
          fi

      - name: Upload asset to existing release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "${TAG_NAME}" >/dev/null
          gh release upload "${TAG_NAME}" dist/management.html --clobber
